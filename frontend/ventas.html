<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ventas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="d-flex">

<div class="sidebar">

<h3 class="text-center mb-4">LUSIANA</h3>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="productos.html">👕 Productos</a>

<a href="clientes.html">👤 Clientes</a>

<a class="active" href="ventas.html">🛒 Ventas</a>

<hr>

<a href="index.html">🚪 Salir</a>

</div>

<div class="contenido">

<h2 class="mb-4">Registrar Venta</h2>

<div class="row">

<div class="col-md-5">

<label>Cliente</label>

<select id="cliente" class="form-select mb-3"></select>

<label>Producto</label>

<select id="producto" class="form-select mb-3"></select>

<label>Cantidad</label>

<input
type="number"
id="cantidad"
class="form-control mb-3"
value="1">

<button
class="btn btn-primary w-100"
onclick="agregarProducto()">

Agregar al carrito

</button>

</div>

<div class="col-md-7">

<table class="table table-hover shadow">

<thead class="table-primary">

<tr>

<th>Producto</th>

<th>Cantidad</th>

<th>Precio</th>

<th>Subtotal</th>

</tr>

</thead>

<tbody id="carrito">

</tbody>

</table>

<h3 class="text-end">

Total:

<span id="total">

S/. 0

</span>

</h3>

<button
id="btnVenta"
class="btn btn-success float-end"
onclick="realizarVenta()">

Realizar Venta

</button>

</div>

</div>

</div>

</div>

<script src="js/ventas.js"></script>

</body>

</html>
