<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boleta de Venta</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #ececec;
        padding: 40px;
      }

      .boleta {
        width: 800px;
        margin: auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        padding: 40px;
      }

      .titulo {
        text-align: center;
        margin-bottom: 20px;
      }

      .titulo h2 {
        margin: 0;
        font-weight: bold;
      }

      hr {
        border-top: 2px dashed gray;
      }

      @media print {
        body {
          background: white;
          padding: 0;
        }

        .botones {
          display: none;
        }

        .boleta {
          box-shadow: none;
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="boleta">
      <div class="titulo">
        <h2>LUSIANA CONFENCCIONES</h2>

        <small>Venta de Uniformes Escolares</small>

        <br />

        <small>RUC: 20456321875</small>
      </div>

      <hr />

      <div class="row">
        <div class="col">
          <b>Boleta Nº:</b>

          <span id="numeroBoleta"></span>
        </div>

        <div class="col text-end">
          <b>Fecha:</b>

          <span id="fecha"></span>
        </div>
      </div>

      <br />

      <b>Cliente:</b>

      <span id="cliente"></span>

      <br /><br />

      <table class="table table-bordered">
        <thead class="table-light">
          <tr>
            <th>Producto</th>

            <th>Cantidad</th>

            <th>Precio</th>

            <th>Subtotal</th>
          </tr>
        </thead>

        <tbody id="detalleBoleta"></tbody>
      </table>

      <h3 class="text-end">
        TOTAL:

        <span id="total"></span>
      </h3>

      <hr />

      <p class="text-center">¡Gracias por su compra!</p>

      <div class="text-center botones">
        <button class="btn btn-success" onclick="window.print()">
          🖨 Imprimir
        </button>

        <a href="ventas.html" class="btn btn-primary"> Regresar </a>
      </div>
    </div>

    <script src="js/boleta.js"></script>
  </body>
</html>
