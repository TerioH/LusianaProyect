<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Productos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="d-flex">

    <!-- MENÚ -->

    <div class="sidebar">

        <h3 class="text-center mb-4">
            LUSIANA
        </h3>

        <a href="dashboard.html">🏠 Dashboard</a>

        <a class="active" href="productos.html">👕 Productos</a>

        <a href="clientes.html">👤 Clientes</a>

        <a href="ventas.html">🛒 Ventas</a>

        <hr>

        <a href="index.html">🚪 Salir</a>

    </div>

    <!-- CONTENIDO -->

    <div class="contenido">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Productos</h2>

            <button
            class="btn btn-primary"
            onclick="limpiarFormulario()"
            data-bs-toggle="modal"
            data-bs-target="#modalProducto">

            + Nuevo Producto

            </button>

        </div>

        <input
        id="buscar"
        class="form-control mb-3"
        placeholder="Buscar producto...">

        <table class="table table-hover shadow bg-white">

            <thead class="table-primary">

                <tr>

                    <th>Código</th>

                    <th>Nombre</th>

                    <th>Tela</th>

                    <th>Talla</th>

                    <th>Color</th>

                    <th>Precio</th>

                    <th>Stock</th>

                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaProductos">

            </tbody>

        </table>

    </div>

</div>


<!-- MODAL -->

<div class="modal fade" id="modalProducto">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5>Producto</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input id="codigo" class="form-control mb-2" placeholder="Código">

<input id="nombre" class="form-control mb-2" placeholder="Nombre">

<input id="tipoTela" class="form-control mb-2" placeholder="Tipo Tela">

<input id="talla" class="form-control mb-2" placeholder="Talla">

<input id="color" class="form-control mb-2" placeholder="Color">

<input id="precio" class="form-control mb-2" placeholder="Precio">

<input id="stock" class="form-control mb-2" placeholder="Stock">

<textarea
id="descripcion"
class="form-control"
placeholder="Descripción"></textarea>

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="guardarProducto()">

Guardar

</button>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/productos.js"></script>

</body>

</html>
