<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Clientes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="d-flex">
      <div class="sidebar">
        <h3 class="text-center mb-4">LUSIANA</h3>

        <a href="dashboard.html">🏠 Dashboard</a>

        <a href="productos.html">👕 Productos</a>

        <a class="active" href="clientes.html">👤 Clientes</a>

        <a href="ventas.html">🛒 Ventas</a>

        <hr />

        <a href="index.html">🚪 Salir</a>
      </div>

      <div class="contenido">
        <div class="d-flex justify-content-between mb-4">
          <h2>Clientes</h2>

          <button
            class="btn btn-primary"
            onclick="limpiarFormulario()"
            data-bs-toggle="modal"
            data-bs-target="#modalCliente"
          >
            + Nuevo Cliente
          </button>
        </div>

        <input
          id="buscar"
          class="form-control mb-3"
          placeholder="Buscar cliente..."
        />

        <table class="table table-hover shadow bg-white">
          <thead class="table-primary">
            <tr>
              <th>DNI</th>

              <th>Nombre</th>

              <th>Apellido</th>

              <th>Teléfono</th>

              <th>Correo</th>

              <th>Dirección</th>

              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tablaClientes"></tbody>
        </table>
      </div>
    </div>

    <div class="modal fade" id="modalCliente">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Cliente</h5>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input id="dni" class="form-control mb-2" placeholder="DNI" />

            <input id="nombre" class="form-control mb-2" placeholder="Nombre" />

            <input
              id="apellido"
              class="form-control mb-2"
              placeholder="Apellido"
            />

            <input
              id="telefono"
              class="form-control mb-2"
              placeholder="Teléfono"
            />

            <input id="correo" class="form-control mb-2" placeholder="Correo" />

            <input
              id="direccion"
              class="form-control"
              placeholder="Dirección"
            />
          </div>

          <div class="modal-footer">
            <button class="btn btn-success" onclick="guardarCliente()">
              Guardar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/clientes.js"></script>
  </body>
</html>
